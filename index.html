<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darwin's Voyage — The Elder Naturalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Atmospheric background layers (visible across screens) -->
        <div class="fog-layer fog-1"></div>
        <div class="fog-layer fog-2"></div>
        <div class="vignette"></div>

        <!-- Title Screen -->
        <div id="title-screen" class="screen active">
            <div class="ember-field" id="ember-field"></div>
            <div class="title-content">
                <div class="title-glow"></div>
                <div class="compass-icon">&#10022;</div>
                <h1>Darwin's Voyage</h1>
                <p class="subtitle">The Elder Naturalist</p>
                <p class="tagline">In the age of sail, one seeker dared to chart the forbidden knowledge of life itself.</p>
                <div class="menu-buttons">
                    <button id="btn-new-game" class="btn-primary">Begin the Voyage</button>
                    <button id="btn-continue" class="btn-primary" style="display:none;">Continue Voyage</button>
                    <button id="btn-journal" class="btn-secondary">Field Journal</button>
                </div>
                <p class="title-footer">HMS Beagle &mdash; MDCCCXXXI</p>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="screen">
            <div class="loading-content">
                <div class="loading-artifact">
                    <svg viewBox="0 0 200 200" class="artifact-svg" aria-hidden="true">
                        <circle cx="100" cy="100" r="92" fill="none" stroke="#c8a24a" stroke-width="1" opacity="0.5"/>
                        <circle cx="100" cy="100" r="78" fill="none" stroke="#c8a24a" stroke-width="0.6" stroke-dasharray="2,4" opacity="0.6"/>
                        <g stroke="#c8a24a" stroke-width="1.2" fill="none" opacity="0.85">
                            <circle cx="100" cy="100" r="34"/>
                            <circle cx="100" cy="100" r="10" fill="#c8a24a" opacity="0.4"/>
                            <path d="M100 8 L100 28 M100 172 L100 192 M8 100 L28 100 M172 100 L192 100"/>
                            <path d="M35 35 L49 49 M165 35 L151 49 M35 165 L49 151 M165 165 L151 151"/>
                            <ellipse cx="60" cy="70" rx="10" ry="5" transform="rotate(-25 60 70)"/>
                            <ellipse cx="142" cy="128" rx="10" ry="5" transform="rotate(-25 142 128)"/>
                            <ellipse cx="130" cy="62" rx="9" ry="4.5" transform="rotate(20 130 62)"/>
                        </g>
                    </svg>
                </div>
                <div id="loading-chapter" class="loading-chapter"></div>
                <div class="loading-divider">&#10070;</div>
                <div id="loading-lore" class="loading-lore"></div>
                <div id="loading-hint" class="loading-hint">click to continue</div>
            </div>
        </div>

        <!-- World Map Screen -->
        <div id="map-screen" class="screen">
            <div class="screen-header">
                <div class="player-info">
                    <span id="player-rank" class="rank-badge">Cabin Boy</span>
                    <span id="player-xp" class="xp-display">0 DP</span>
                </div>
                <button id="btn-journal-map" class="btn-icon" title="Field Journal">&#128214;</button>
            </div>
            <h2 class="map-title">The Voyage of HMS Beagle</h2>
            <div id="voyage-map" class="voyage-map">
                <!-- Map stops generated by JS -->
            </div>
        </div>

        <!-- Story Screen -->
        <div id="story-screen" class="screen">
            <div class="screen-header">
                <div class="player-info">
                    <span id="story-rank" class="rank-badge">Cabin Boy</span>
                    <span id="story-xp" class="xp-display">0 DP</span>
                </div>
                <button id="btn-journal-story" class="btn-icon" title="Field Journal">&#128214;</button>
            </div>
            <div id="story-content" class="story-panel">
                <div id="story-speaker" class="speaker-name"></div>
                <div id="story-text" class="story-text"></div>
            </div>
            <button id="btn-story-next" class="btn-primary">Continue</button>
        </div>

        <!-- Puzzle Screen -->
        <div id="puzzle-screen" class="screen">
            <div class="screen-header">
                <div class="player-info">
                    <span id="puzzle-rank" class="rank-badge">Cabin Boy</span>
                    <span id="puzzle-xp" class="xp-display">0 DP</span>
                </div>
                <div class="puzzle-controls">
                    <button id="btn-hint" class="btn-hint" title="Use Hint (-5 DP)">Hint</button>
                    <button id="btn-journal-puzzle" class="btn-icon" title="Field Journal">&#128214;</button>
                </div>
            </div>
            <div id="puzzle-title" class="puzzle-title"></div>
            <div id="puzzle-instruction" class="puzzle-instruction"></div>
            <div id="puzzle-area" class="puzzle-area"></div>
            <div id="puzzle-feedback" class="puzzle-feedback hidden"></div>
            <button id="btn-check-answer" class="btn-primary">Check Answer</button>
            <button id="btn-puzzle-next" class="btn-primary hidden">Continue</button>
        </div>

        <!-- Chapter Complete Screen -->
        <div id="complete-screen" class="screen">
            <div class="complete-content">
                <h2 id="complete-title">Chapter Complete!</h2>
                <div id="complete-stars" class="stars-display"></div>
                <p id="complete-xp" class="complete-xp"></p>
                <div id="complete-journal" class="complete-journal"></div>
                <button id="btn-complete-continue" class="btn-primary">Return to Map</button>
            </div>
        </div>

        <!-- Field Journal Screen -->
        <div id="journal-screen" class="screen">
            <div class="journal-header">
                <h2>Field Journal</h2>
                <button id="btn-journal-close" class="btn-secondary">Close</button>
            </div>
            <div id="journal-content" class="journal-content">
                <!-- Journal entries populated by JS -->
            </div>
        </div>
    </div>

    <script src="js/engine.js"></script>
    <script src="js/story.js"></script>
    <script src="js/puzzles.js"></script>
    <script src="js/chapters/chapter1.js"></script>
    <script src="js/chapters/chapter2.js"></script>
    <script src="js/chapters/chapter3.js"></script>
    <script src="js/chapters/chapter4.js"></script>
    <script src="js/chapters/chapter5.js"></script>
    <script src="js/chapters/chapter6.js"></script>
    <script src="js/chapters/chapter7.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Game.init();
        });
    </script>
</body>
</html>
