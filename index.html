<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darwin's Voyage — A Biology Discovery Game</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Title Screen -->
        <div id="title-screen" class="screen active">
            <div class="title-content">
                <div class="compass-icon">&#9788;</div>
                <h1>Darwin's Voyage</h1>
                <p class="subtitle">A Naturalist's Journey of Discovery</p>
                <p class="tagline">HMS Beagle, 1831</p>
                <div class="menu-buttons">
                    <button id="btn-new-game" class="btn-primary">New Voyage</button>
                    <button id="btn-continue" class="btn-primary" style="display:none;">Continue Voyage</button>
                    <button id="btn-journal" class="btn-secondary">Field Journal</button>
                </div>
            </div>
        </div>

        <!-- World Map Screen -->
        <div id="map-screen" class="screen">
            <div class="screen-header">
                <div class="player-info">
                    <span id="player-rank" class="rank-badge">Cabin Boy</span>
                    <span id="player-xp" class="xp-display">0 DP</span>
                </div>
                <button id="btn-journal-map" class="btn-icon" title="Field Journal">&#128214;</button>
            </div>
            <h2 class="map-title">The Voyage of HMS Beagle</h2>
            <div id="voyage-map" class="voyage-map">
                <!-- Map stops generated by JS -->
            </div>
        </div>

        <!-- Story Screen -->
        <div id="story-screen" class="screen">
            <div class="screen-header">
                <div class="player-info">
                    <span id="story-rank" class="rank-badge">Cabin Boy</span>
                    <span id="story-xp" class="xp-display">0 DP</span>
                </div>
                <button id="btn-journal-story" class="btn-icon" title="Field Journal">&#128214;</button>
            </div>
            <div id="story-content" class="story-panel">
                <div id="story-speaker" class="speaker-name"></div>
                <div id="story-text" class="story-text"></div>
            </div>
            <button id="btn-story-next" class="btn-primary">Continue</button>
        </div>

        <!-- Puzzle Screen -->
        <div id="puzzle-screen" class="screen">
            <div class="screen-header">
                <div class="player-info">
                    <span id="puzzle-rank" class="rank-badge">Cabin Boy</span>
                    <span id="puzzle-xp" class="xp-display">0 DP</span>
                </div>
                <div class="puzzle-controls">
                    <button id="btn-hint" class="btn-hint" title="Use Hint (-5 DP)">Hint</button>
                    <button id="btn-journal-puzzle" class="btn-icon" title="Field Journal">&#128214;</button>
                </div>
            </div>
            <div id="puzzle-title" class="puzzle-title"></div>
            <div id="puzzle-instruction" class="puzzle-instruction"></div>
            <div id="puzzle-area" class="puzzle-area"></div>
            <div id="puzzle-feedback" class="puzzle-feedback hidden"></div>
            <button id="btn-check-answer" class="btn-primary">Check Answer</button>
            <button id="btn-puzzle-next" class="btn-primary hidden">Continue</button>
        </div>

        <!-- Chapter Complete Screen -->
        <div id="complete-screen" class="screen">
            <div class="complete-content">
                <h2 id="complete-title">Chapter Complete!</h2>
                <div id="complete-stars" class="stars-display"></div>
                <p id="complete-xp" class="complete-xp"></p>
                <div id="complete-journal" class="complete-journal"></div>
                <button id="btn-complete-continue" class="btn-primary">Return to Map</button>
            </div>
        </div>

        <!-- Field Journal Screen -->
        <div id="journal-screen" class="screen">
            <div class="journal-header">
                <h2>Field Journal</h2>
                <button id="btn-journal-close" class="btn-secondary">Close</button>
            </div>
            <div id="journal-content" class="journal-content">
                <!-- Journal entries populated by JS -->
            </div>
        </div>
    </div>

    <script src="js/engine.js"></script>
    <script src="js/story.js"></script>
    <script src="js/puzzles.js"></script>
    <script src="js/chapters/chapter1.js"></script>
    <script src="js/chapters/chapter2.js"></script>
    <script src="js/chapters/chapter3.js"></script>
    <script src="js/chapters/chapter4.js"></script>
    <script src="js/chapters/chapter5.js"></script>
    <script src="js/chapters/chapter6.js"></script>
    <script src="js/chapters/chapter7.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Game.init();
        });
    </script>
</body>
</html>
